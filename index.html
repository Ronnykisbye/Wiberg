<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lars Wiberg | Total Service</title>

<style>

body {
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

/* HERO */
.hero {
    height:60vh;
    background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('assets/images/beforeafter.jpg');
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
}

.section {
    padding:60px;
    text-align:center;
}

/* CARDS */
.services {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card {
    background:white;
    padding:20px;
    width:250px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* BEFORE AFTER */
.ba-container {
    position:relative;
    width:80%;
    max-width:800px;
    margin:50px auto;
}

.ba-container img {
    width:100%;
    border-radius:10px;
}

.ba-line {
    position:absolute;
    top:0;
    bottom:0;
    left:50%;
    width:4px;
    background:white;
}

/* LABELS */
.label {
    position:absolute;
    top:10px;
    padding:5px 10px;
    color:white;
    font-weight:bold;
}

.before {
    left:10px;
    background:gray;
}

.after {
    right:10px;
    background:green;
}

</style>

</head>

<body>

<section class="hero">
<div>
<h1>Lars Wiberg</h1>
<p>Skilte • Have • Fliser • Oprydning</p>
</div>
</section>

<section class="section">

<h2>Vores Services</h2>

<div class="services">

<div class="card">Græsslåning</div>
<div class="card">Hækklipning</div>
<div class="card">Flisearbejde</div>
<div class="card">Affald</div>
<div class="card">Skilte & Print</div>

</div>

</section>

<section class="section">

<h2>Før og efter</h2>

<div class="ba-container">

<img src="assets/images/beforeafter.jpg">

<div class="ba-line"></div>

<div class="label before">FØR</div>
<div class="label after">EFTER</div>

</div>

</section>

</body>
</html>
